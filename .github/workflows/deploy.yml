name: Deploy CV Site

run-name: Deploy CV Site (${{ github.event.inputs.environment || 'production' }})

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target GitHub environment (holds AWS creds + vars.BUCKET / vars.CLOUDFRONT_DISTRIBUTION_ID)'
        required: true
        default: 'production'
        type: choice
        options:
          - production

jobs:
  build:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # No bundler here — the site is plain HTML/CSS/JS + JSON content files,
      # there's nothing to compile. "Build" just means validate before we ship it.
      - name: Validate content JSON
        run: |
          for f in site/content/*.json; do
            echo "checking $f"
            python3 -m json.tool "$f" > /dev/null
          done

      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: site/
          retention-days: 1

  # ============ DEPLOY (S3 + CloudFront) ============
  # Infra (S3 bucket, CloudFront distribution) is managed by `tofu apply` run
  # locally — this job only ships content into resources that already exist.
  deploy_production:
    runs-on: ubuntu-latest
    needs: build
    environment: ${{ github.event.inputs.environment || 'production' }}
    steps:
      - name: Download site artifact
        uses: actions/download-artifact@v4
        with:
          name: site
          path: site/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      # index.html is uploaded separately with a short cache lifetime so viewers
      # always get the latest shell; everything else (css/js/json) can be cached
      # hard since filenames don't change — CloudFront invalidation below covers
      # the case where content did change without a filename change.
      - name: Sync static assets to S3
        run: |
          aws s3 sync site/ s3://${{ vars.BUCKET }} \
            --delete \
            --exclude "index.html" \
            --cache-control "public,max-age=31536000,immutable"

      - name: Upload index.html
        run: |
          aws s3 cp site/index.html s3://${{ vars.BUCKET }}/index.html \
            --cache-control "public,max-age=60,must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
