name: Deploy CV Site

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production

run-name: "Deploy to ${{ inputs.environment }} by @${{ github.actor }}"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build site
        run: |
          set -euo pipefail
          echo "No bundler here — the site is plain HTML/CSS/JS + JSON content files."
          echo "Build step = validate the content before it ships."

          for f in site/content/*.json; do
            echo "checking $f"
            python3 -m json.tool "$f" > /dev/null
          done

          # Basic sanity: make sure the entry point and both language files exist
          test -f site/index.html
          test -f site/content/content.en.json
          test -f site/content/content.ua.json

      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: site/
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: ${{ inputs.environment }}
    steps:
      - name: Download site artifact
        uses: actions/download-artifact@v4
        with:
          name: site
          path: site/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Sync static assets to S3
        run: |
          aws s3 sync ./site s3://${{ vars.S3_BUCKET }} \
            --delete \
            --exclude "index.html" \
            --cache-control "public,max-age=31536000,immutable"

      - name: Upload index.html
        run: |
          aws s3 cp ./site/index.html s3://${{ vars.S3_BUCKET }}/index.html \
            --cache-control "public,max-age=60,must-revalidate"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"